<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Límite de Crédito</title>
</head>
<body>
  <h1>Límite de Crédito</h1>
  <button onclick="verLimite()">Ver límites</button>

  <table border="1" cellpadding="8" id="tablaLimite">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Límite Total</th>
        <th>Límite Usado</th>
        <th>Límite Disponible</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function verLimite() {
      const res = await fetch('/api/limite-credito');
      const limites = await res.json();

      const tbody = document.querySelector('#tablaLimite tbody');
      tbody.innerHTML = '';

      limites.forEach(limite => {
        const fila = document.createElement('tr');
        fila.innerHTML = `
          <td>${limite.usuario}</td>
          <td>$${limite.limite_total}</td>
          <td>$${limite.limite_usado}</td>
          <td>$${limite.limite_disponible}</td>
        `;
        tbody.appendChild(fila);
      });
    }
  </script>
</body>
</html>
