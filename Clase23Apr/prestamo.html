<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Préstamos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      padding: 2rem;
    }

    h1 {
      color: #333;
    }

    button {
      background-color: #4CAF50;
      color: white;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background-color: #45a049;
    }

    #resultado {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .tarjeta {
      background-color: white;
      border-radius: 12px;
      padding: 1.5rem;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .tarjeta h2 {
      margin: 0 0 0.5rem 0;
      color: #222;
    }

    .tarjeta p {
      margin: 0.3rem 0;
      color: #555;
    }

    .status-aprobado {
      color: green;
      font-weight: bold;
    }

    .status-pendiente {
      color: orange;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Solicitud de Préstamo</h1>
  <p>Préstamos disponibles para nuestros usuarios.</p>
  <button onclick="verPrestamos()">Ver préstamos</button>

  <div id="resultado"></div>

  <script>
    async function verPrestamos() {
      const res = await fetch('/api/prestamo');
      const datos = await res.json();

      const contenedor = document.getElementById('resultado');
      contenedor.innerHTML = '';

      datos.forEach(prestamo => {
        const tarjeta = document.createElement('div');
        tarjeta.classList.add('tarjeta');

        tarjeta.innerHTML = `
          <h2>👤 ${prestamo.usuario}</h2>
          <p>💰 Monto: $${prestamo.monto}</p>
          <p>📅 Plazo: ${prestamo.plazo} semanas</p>
          <p>Estado: <span class="status-${prestamo.status}">${prestamo.status}</span></p>
        `;

        contenedor.appendChild(tarjeta);
      });
    }
  </script>
</body>
</html>
