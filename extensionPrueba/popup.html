<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="popup">
    <h1>Usuarios</h1>
    <p id="mensaje">Consulta la tabla usuarios desde tu API local.</p>

    <button id="botonCargar" type="button">Cargar datos</button>

    <section id="resultado" class="resultado" aria-live="polite"></section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
